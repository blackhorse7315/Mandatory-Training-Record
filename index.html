    <script>
        // --- DATA & STATE DEFINITION ---
        const categories = [
            { id: 'crm', name: 'Mandatory Crew Resources Management' },
            { id: 'dg', name: 'Dangerous Good' },
            { id: 'windshear', name: 'Windshear' },
            { id: 'alar', name: 'ALAR CFIT' },
            { id: 'emergency', name: 'Crew Emergency Training' },
            { id: 'english', name: 'English Proficiency' },
            { id: 'medical', name: 'Medical Examination' },
            { id: 'nav', name: 'Performance Basic Navigation' },
            { id: 'passport', name: 'Passport' },
            { id: 'ppc', name: 'Proficiency Pilot Check' },
            { id: 'loa', name: 'Letter of Authorization' },
            { id: 'company_check', name: 'Company Check Pilot' },
            { id: 'line_check', name: 'Annual Line Check' },
            { id: 'avsec', name: 'Aviation Security' },
            { id: 'sms', name: 'Safety Management System' },
            { id: 'approval', name: 'Initial & Final Approval' }
        ];

        let isAdminLoggedIn = false;
        let editCrewId = null;
        let isTableEditMode = false;
        let currentView = 'dashboard';
        let isSidebarOpen = false;
        
        // --- GOOGLE SHEETS API CONFIGURATION ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDF0ifmMP1Z3IvwIO4mdscaosfLXFkrc4k01zTcAWEHev_8-IA5IyOQLeRd0__MoN3/exec"; 
        
        let formNoAllData = "F-TWA-OPS-057-01";
        let formNoCategory = "F-TWA-OPS-058-01";

        let mockData = [];

        // --- GOOGLE SHEETS API FUNCTIONS ---
        async function sendDataToGoogleSheets(action, payload) {
            if(GOOGLE_SCRIPT_URL === "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE") {
                console.log("Simulasi Lokal. Aksi:", action, "Payload:", payload);
                return { status: "success", simulated: true };
            }

            try {
                const dataToPost = { action: action, ...payload };
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(dataToPost)
                });
                
                const responseText = await response.text();
                try {
                    return JSON.parse(responseText);
                } catch (parseError) {
                    return { status: "success", raw: responseText };
                }
            } catch (error) {
                console.error("Gagal mengirim data:", error);
                return { status: "error", message: error.message };
            }
        }

        async function syncData(isSilent = false) {
            if(GOOGLE_SCRIPT_URL === "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE") {
                if(!isSilent) alert("Harap masukkan URL Web App Google Apps Script Anda.");
                navigate('dashboard');
                return;
            }

            try {
                if(!isSilent) document.body.style.cursor = 'wait';
                
                // Tambahkan animasi berputar pada tombol sync
                const syncBtn = document.getElementById('sync-btn');
                if(syncBtn) syncBtn.classList.add('animate-spin', 'text-blue-500');

                const res = await sendDataToGoogleSheets("FETCH_ALL_DATA", {});
                
                if (res && res.status === "success" && res.data) {
                    mockData = res.data.map(crew => {
                        // Pastikan objek training ada (Fallback safety)
                        if (!crew.training) crew.training = {};
                        categories.forEach(cat => {
                            if (!crew.training[cat.id]) {
                                crew.training[cat.id] = { issueDate: '', expiryDate: '', englishLevel: 'Level 4' };
                            }
                            recalculateStatus(crew, cat.id);
                        });
                        return crew;
                    });

                    // Simpan data terbaru ke Cache Lokal (Local Storage)
                    localStorage.setItem('ecrew_cached_data', JSON.stringify(mockData));
                } else if (!isSilent) {
                    mockData = [];
                }
            } catch (error) {
                console.error("Error saat sinkronisasi:", error);
            } finally {
                if(!isSilent) document.body.style.cursor = 'default';
                const syncBtn = document.getElementById('sync-btn');
                if(syncBtn) syncBtn.classList.remove('animate-spin', 'text-blue-500');
                
                navigate(currentView);
            }
        }

        // --- UTILITY FUNCTIONS ---
        function formatDate(dateStr) {
            if (!dateStr || dateStr === '') return '-';
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            return `${parts[2]}-${parts[1]}-${parts[0]}`; // Convert YYYY-MM-DD to DD-MM-YYYY
        }

        function recalculateStatus(crew, categoryId) {
            const training = crew.training[categoryId];
            
            // Handle if no data yet
            if (!training.expiryDate || training.expiryDate === '') {
                training.status = 'No Data';
                training.statusColor = 'bg-slate-100 text-slate-800 border border-slate-200';
                training.daysLeft = 0;
                return;
            }

            const today = new Date();
            today.setHours(0,0,0,0);
            const expDate = new Date(training.expiryDate);
            expDate.setHours(0,0,0,0);
            
            const timeDiff = expDate.getTime() - today.getTime();
            const daysOffset = Math.ceil(timeDiff / (1000 * 3600 * 24));

            training.daysLeft = daysOffset;

            if (daysOffset < 0) {
                training.status = 'Expired';
                training.statusColor = 'bg-red-100 text-red-800 border border-red-200';
            } else if (daysOffset <= 60) {
                training.status = 'Expiring Soon';
                training.statusColor = 'bg-yellow-100 text-yellow-800 border border-yellow-200';
            } else {
                training.status = 'Valid';
                training.statusColor = 'bg-green-100 text-green-800 border border-green-200';
            }
        }

        async function toggleTableEditMode(categoryId) {
            if (isTableEditMode) {
                document.body.style.cursor = 'wait';
                
                // Ambil hanya data untuk kategori sheet saat ini
                const payloadData = mockData.map(c => ({
                    id: c.id,
                    training: c.training[categoryId]
                }));

                const res = await sendDataToGoogleSheets("UPDATE_CATEGORY", { 
                    category: categoryId, 
                    data: payloadData 
                });
                document.body.style.cursor = 'default';
                
                if(res.status !== "success") {
                    alert("Gagal menyimpan data ke server! Silakan coba lagi.");
                }
            }
            
            isTableEditMode = !isTableEditMode;
            const category = categories.find(c => c.id === categoryId);
            renderTable(category);
        }

        function updateCrewField(id, categoryId, field, value) {
            const crew = mockData.find(c => c.id === id);
            if (crew) {
                crew.training[categoryId][field] = value;
                if (field === 'expiryDate') {
                    recalculateStatus(crew, categoryId);
                }
                const category = categories.find(c => c.id === currentView);
                if(category) renderTable(category);
            }
        }

        async function handleFileUpload(inputElem, crewId, categoryId) {
            const file = inputElem.files[0];
            if (!file) return;
            if (file.type !== 'application/pdf') {
                alert('Silakan upload file berformat PDF.');
                inputElem.value = '';
                return;
            }
            if (file.size > 5 * 1024 * 1024) { // Batas maksimal 5MB untuk kelancaran API
                alert('Ukuran file maksimal 5MB.');
                inputElem.value = '';
                return;
            }

            // Tampilkan status uploading
            const statusElem = document.getElementById(`upload-status-${crewId}`);
            if(statusElem) {
                statusElem.innerText = "Uploading ke Drive...";
                statusElem.className = "text-xs text-blue-600 font-medium mt-1 block animate-pulse";
            }
            
            // Konversi file ke base64 agar bisa dikirim lewat Google Sheets API
            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64Data = e.target.result.split(',')[1];
                
                try {
                    const res = await sendDataToGoogleSheets("UPLOAD_PDF", {
                        filename: `Approval_${crewId}.pdf`,
                        mimeType: file.type,
                        base64: base64Data
                    });

                    if (res.status === 'success') {
                        if(statusElem) {
                            statusElem.innerText = "Upload sukses!";
                            statusElem.className = "text-xs text-green-600 font-medium mt-1 block";
                        }
                        // Update field fileUrl secara lokal & panggil render ulang
                        updateCrewField(crewId, categoryId, 'fileUrl', res.fileUrl);
                    } else {
                        if(statusElem) {
                            statusElem.innerText = "Upload gagal.";
                            statusElem.className = "text-xs text-red-500 font-medium mt-1 block";
                        }
                        
                        // Menangani peringatan khusus jika Apps Script belum diberikan akses Drive
                        if (res.message && res.message.includes('permission to call DriveApp')) {
                            alert("SISTEM BELUM DIOTORISASI!\n\nKarena Anda menambahkan fitur upload Drive, Anda perlu memberikan izin pada Google Apps Script Anda.\n\nCara memperbaiki:\n1. Buka Google Apps Script (Backend).\n2. Pilih fungsi 'doGet' atau 'doPost', lalu klik tombol Run/Jalankan.\n3. Klik 'Review Permissions' (Tinjau Izin) -> Lanjutan -> Izinkan.\n4. Lakukan New Deployment ulang.");
                        } else {
                            alert("Upload Gagal: " + (res.message || "Terdapat kesalahan koneksi ke server."));
                        }
                        console.error("Detail Error:", res.message);
                    }
                } catch (err) {
                    if(statusElem) {
                        statusElem.innerText = "Error jaringan.";
                        statusElem.className = "text-xs text-red-500 font-medium mt-1 block";
                    }
                    console.error("Fetch Error:", err);
                }
            };
            reader.readAsDataURL(file);
        }

        async function duplicateCrewItem(id, categoryId) {
            const crew = mockData.find(c => c.id === id);
            if(crew) {
                const newId = `CRW-${Math.floor(2000 + Math.random() * 8000)}`;
                // Duplikat master dan copy training array-nya
                const newCrew = JSON.parse(JSON.stringify(crew)); 
                newCrew.id = newId;
                newCrew.name = `${crew.name} (Copy)`;

                mockData.unshift(newCrew);

                document.body.style.cursor = 'wait';
                await sendDataToGoogleSheets("ADD_CREW_MASTER", { crew: newCrew });
                // Note: Pada backend, fetch data ulang biasanya dibutuhkan agar state bersih
                document.body.style.cursor = 'default';

                const category = categories.find(c => c.id === categoryId);
                renderTable(category);
            }
        }

        async function deleteCrewItem(id, categoryId) {
            if(confirm('Are you sure you want to delete this crew member from the ENTIRE system?')) {
                mockData = mockData.filter(c => c.id !== id);
                await sendDataToGoogleSheets("DELETE_CREW_MASTER", { id: id });

                const category = categories.find(c => c.id === categoryId);
                renderTable(category);
            }
        }

        // --- UI RENDERERS ---

        function renderDashboard() {
            // Kalkulasi Status untuk Dashboard berdasarkan "Status Terburuk" dari Crew
            let validCount = 0;
            let expiringCount = 0;
            let expiredCount = 0;

            mockData.forEach(crew => {
                let crewStatus = 'Valid';
                // Loop semua kategori yang ia miliki
                for (let cat of categories) {
                    const s = crew.training[cat.id].status;
                    if (s === 'Expired') {
                        crewStatus = 'Expired';
                        break; // Jika ada 1 yang expired, langsung cap Expired
                    }
                    if (s === 'Expiring Soon') {
                        crewStatus = 'Expiring Soon'; // Jika tidak ada expired, setidaknya expiring soon
                    }
                }
                
                if (crewStatus === 'Expired') expiredCount++;
                else if (crewStatus === 'Expiring Soon') expiringCount++;
                else validCount++;
            });
            
            const trainingCardsHtml = categories.map(cat => `
                <div onclick="navigate('${cat.id}')" class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 cursor-pointer hover:shadow-md hover:border-blue-400 hover:-translate-y-1 transition-all duration-200 flex items-center group">
                    <div class="p-3 rounded-lg bg-blue-50 text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors mr-4 flex-shrink-0">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <div class="overflow-hidden">
                        <h4 class="font-semibold text-slate-800 group-hover:text-blue-700 transition-colors truncate" title="${cat.name}">${cat.name}</h4>
                        <p class="text-xs text-slate-500 mt-1">Click to view records &rarr;</p>
                    </div>
                </div>
            `).join('');

            const html = `
                <div class="mb-8 flex justify-between items-start">
                    <div>
                        <h3 class="text-2xl font-bold text-slate-800">Fleet Overview</h3>
                        <p class="text-slate-500 text-sm mt-1">Summary of all mandatory training compliances.</p>
                    </div>
                    <button onclick="exportDashboardPDF()" class="px-4 py-2 bg-slate-800 border border-transparent rounded-lg text-sm font-medium text-white hover:bg-slate-900 shadow-sm flex items-center transition-colors">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Download PDF
                    </button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col items-center justify-center text-center hover:shadow-md transition-shadow">
                        <div class="p-4 rounded-full bg-slate-100 text-slate-600 mb-3">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        </div>
                        <p class="text-sm font-medium text-slate-500 mb-1">Total Tracked Crew</p>
                        <p class="text-3xl font-bold text-slate-800">${mockData.length}</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col items-center justify-center text-center hover:shadow-md transition-shadow">
                        <div class="p-4 rounded-full bg-green-50 text-green-600 mb-3">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                        <p class="text-sm font-medium text-slate-500 mb-1">Fully Compliant</p>
                        <p class="text-3xl font-bold text-slate-800">${validCount}</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col items-center justify-center text-center hover:shadow-md transition-shadow">
                        <div class="p-4 rounded-full bg-yellow-50 text-yellow-600 mb-3">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                        <p class="text-sm font-medium text-slate-500 mb-1">Expiring <= 60 Days</p>
                        <p class="text-3xl font-bold text-slate-800">${expiringCount}</p>
                    </div>

        async function handleCrewSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('crew-name').value;
            const rank = document.getElementById('crew-rank').value;
            const licenseNo = document.getElementById('crew-license').value;
            const submitBtn = document.getElementById('submit-btn');

            const originalBtnText = submitBtn.innerText;
            submitBtn.innerText = "Saving to Sheets...";
            submitBtn.disabled = true;
            document.body.style.cursor = 'wait';

            try {
                if (editCrewId) {
                    // Update Existing
                    const index = mockData.findIndex(c => c.id === editCrewId);
                    if (index > -1) {
                        mockData[index].name = name;
                        mockData[index].rank = rank;
                        mockData[index].licenseNo = licenseNo;
                        
                        await sendDataToGoogleSheets("EDIT_CREW_MASTER", { crew: mockData[index] });
                    }
                } else {
                    // Create New
                    const newId = `CRW-${Math.floor(2000 + Math.random() * 8000)}`;
                    const newCrew = {
                        id: newId,
                        name: name,
                        rank: rank,
                        licenseNo: licenseNo,
                        training: {}
                    };
                    
                    // Inisialisasi training kosong agar status bisa dikalkulasi
                    categories.forEach(cat => {
                        newCrew.training[cat.id] = { issueDate: '', expiryDate: '', englishLevel: 'Level 4' };
                        recalculateStatus(newCrew, cat.id);
                    });

                    mockData.unshift(newCrew);
                    await sendDataToGoogleSheets("ADD_CREW_MASTER", { crew: newCrew });
                }
            } catch (err) {
                console.error("Error saat menyimpan:", err);
                alert("Terjadi kesalahan sistem saat mencoba menyimpan.");
            } finally {
                document.body.style.cursor = 'default';
                submitBtn.innerText = originalBtnText;
                submitBtn.disabled = false;
                resetForm();
                renderAdminDashboard(); // Refresh table
            }
        }

        function prepareEdit(id) {
            const crew = mockData.find(c => c.id === id);
            if (!crew) return;

            document.getElementById('crew-name').value = crew.name;
            document.getElementById('crew-rank').value = crew.rank;
            document.getElementById('crew-license').value = crew.licenseNo || '';
            
            editCrewId = id;
            document.getElementById('form-title').innerHTML = `
                <svg class="w-5 h-5 mr-2 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>

            document.getElementById('submit-btn').innerText = "Update Data";

        async function deleteCrew(id) {
            if(confirm('Are you sure you want to delete this crew record? This will remove them from all sheets.')) {
                mockData = mockData.filter(c => c.id !== id);
                await sendDataToGoogleSheets("DELETE_CREW_MASTER", { id: id });

        // --- PDF EXPORT LOGIC ---
        
        function exportDashboardPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'pt', 'a4');
            const today = new Date().toLocaleDateString('en-GB');

            const generatePDF = (logoImg) => {
                doc.setFillColor(15, 23, 42); 
                doc.rect(0, 0, 600, 100, 'F'); 
                
                if (logoImg) {
                    const maxImgHeight = 70;
                    const maxImgWidth = 150;
                    let imgWidth = logoImg.width;
                    let imgHeight = logoImg.height;
                    
                    const ratio = Math.min(maxImgWidth / imgWidth, maxImgHeight / imgHeight);
                    imgWidth *= ratio;
                    imgHeight *= ratio;

                    const pdfWidth = doc.internal.pageSize.getWidth();
                    const xPos = pdfWidth - 40 - imgWidth;
                    const yPos = (100 - imgHeight) / 2;

                    doc.addImage(logoImg, 'PNG', xPos, yPos, imgWidth, imgHeight);
                }

                doc.setTextColor(255, 255, 255);
                
                doc.setFontSize(20);
                doc.setFont("helvetica", "bold");
                doc.text("MANDATORY TRAINING PILOT", 40, 42);
                
                doc.setFontSize(12);
                doc.setFont("helvetica", "bold");
                doc.text("Transwisata Prima Aviation", 40, 62);
                
                doc.setFontSize(10);
                doc.setFont("helvetica", "normal");
                doc.text(`Form no: ${formNoAllData}`, 40, 80);

                let validCount = 0;
                let expiringCount = 0;
                let expiredCount = 0;

                mockData.forEach(crew => {
                    let crewStatus = 'Valid';
                    for (let cat of categories) {
                        const s = crew.training[cat.id].status;
                        if (s === 'Expired') { crewStatus = 'Expired'; break; }
                        if (s === 'Expiring Soon') { crewStatus = 'Expiring Soon'; }
                    }
                    if (crewStatus === 'Expired') expiredCount++;
                    else if (crewStatus === 'Expiring Soon') expiringCount++;
                    else validCount++;
                });

                doc.setTextColor(51, 65, 85); 
                doc.setFont("helvetica", "normal");
                doc.setFontSize(10);
                
                doc.text(`Total Tracked Crew: ${mockData.length}`, 40, 130);
                doc.text(`Fully Compliant: ${validCount}`, 40, 145);
                doc.text(`Expiring <= 60 Days: ${expiringCount}`, 250, 130);
                doc.text(`Critical / Expired: ${expiredCount}`, 250, 145);

                doc.setDrawColor(226, 232, 240); 
                doc.line(40, 160, 550, 160);

                let currentY = 190;

                categories.forEach((cat, index) => {
                    if (cat.id === 'dashboard') return;

                    if (currentY > 700) {
                        doc.addPage();
                        currentY = 40;
                    }

                    doc.setTextColor(15, 23, 42);
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(12);
                    const titleText = cat.name;
                    const pageWidth = doc.internal.pageSize.getWidth();
                    const textWidth = doc.getTextWidth(titleText);
                    const titleX = (pageWidth - textWidth) / 2;
                    doc.text(titleText, titleX, currentY);
                    currentY += 15;

                    let lastDateTitle = "Last Mandatory Date";
                    switch(cat.id) {
                        case 'medical': lastDateTitle = "Last Medical Date"; break;
                        case 'nav': lastDateTitle = "Last PBN Date"; break;
                        case 'passport':
                        case 'loa':
                        case 'company_check':
                        case 'approval': lastDateTitle = "Date of Issue"; break;
                        case 'ppc': lastDateTitle = "Last PPC Date"; break;
                        case 'line_check': lastDateTitle = "Last Annual Check"; break;
                    }

                    const isNoExpiryCat = cat.id === 'avsec' || cat.id === 'sms';
                    const expiryDateTitle = isNoExpiryCat ? "Date of Conduct" : "Date of Expiry";

                    let headRow = ['No', 'Rank, Name & License No.'];
                    if (cat.id === 'english') headRow.push('English Level');
                    if (!isNoExpiryCat) headRow.push(lastDateTitle);
                    headRow.push(expiryDateTitle);
                    headRow.push('Status');

                    const head = [headRow];
                    const body = mockData.map((crew, idx) => {
                        const license = crew.licenseNo ? crew.licenseNo : '-';
                        const formattedName = `${crew.rank} ${crew.name} ${license}`;
                        const training = crew.training[cat.id];

                        let row = [idx + 1, formattedName];
                        if (cat.id === 'english') row.push(training.englishLevel || '-');
                        if (!isNoExpiryCat) row.push(formatDate(training.issueDate));
                        row.push(formatDate(isNoExpiryCat ? training.issueDate : training.expiryDate));
                        row.push(isNoExpiryCat ? 'Current' : (training.status || '-'));
                        return row;
                    });

                    doc.autoTable({
                        startY: currentY,
                        head: head,
                        body: body,
                        theme: 'grid',
                        headStyles: { fillColor: [241, 245, 249], textColor: [15, 23, 42], fontSize: 9, halign: 'center' },
                        bodyStyles: { fontSize: 8, textColor: [51, 65, 85], halign: 'center' },
                        columnStyles: { 1: { halign: 'left' } },
                        margin: { left: 40, right: 40 },
                        didParseCell: function(data) {
                            if (data.section === 'body' && data.column.index === headRow.length - 1) {
                                if (data.cell.raw === 'Valid' || data.cell.raw === 'Current') data.cell.styles.textColor = [21, 128, 61]; 
                                else if (data.cell.raw === 'Expiring Soon') data.cell.styles.textColor = [161, 98, 7];
                                else if (data.cell.raw === 'Expired') data.cell.styles.textColor = [185, 28, 28];
                                data.cell.styles.fontStyle = 'bold';
                            }
                        }
                    });

                    currentY = doc.lastAutoTable.finalY + 30;
                });

                doc.save(`Ecrew_Full_Mandatory_Report_${today.replace(/\//g, '-')}.pdf`);
            };

            const logoUrl = "https://lh3.googleusercontent.com/d/1WNcGjsZ9_Fp54xzOl01EYRqM6-wY5Zh7";
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = function() { generatePDF(this); };
            img.onerror = function() { generatePDF(null); }; 
            img.src = logoUrl;
        }

                if (logoImg) {
                    const maxImgHeight = 70;
                    const maxImgWidth = 150;
                    let imgWidth = logoImg.width;
                    let imgHeight = logoImg.height;
                    
                    const ratio = Math.min(maxImgWidth / imgWidth, maxImgHeight / imgHeight);
                    imgWidth *= ratio;
                    imgHeight *= ratio;

                    const pdfWidth = doc.internal.pageSize.getWidth();
                    const xPos = pdfWidth - 40 - imgWidth;
                    const yPos = (100 - imgHeight) / 2;

                    doc.addImage(logoImg, 'PNG', xPos, yPos, imgWidth, imgHeight);
                }

                doc.setTextColor(255, 255, 255);
                doc.setFontSize(20);
                doc.setFont("helvetica", "bold");
                doc.text("MANDATORY TRAINING RECORD", 40, 42);
                
                doc.setFontSize(12);
                doc.setFont("helvetica", "bold");
                doc.text(`Category: ${category.name}`, 40, 62);

                doc.setFontSize(10);
                doc.setFont("helvetica", "normal");
                doc.text(`Form no: ${formNoCategory}`, 40, 80);

                doc.setTextColor(100, 116, 139);
                doc.setFontSize(9);
                doc.text(`Document Generated: ${today}`, 40, 125);

                let lastDateTitle = "Last Mandatory Date";
                switch(categoryId) {
                    case 'medical': lastDateTitle = "Last Medical Date"; break;
                    case 'nav': lastDateTitle = "Last PBN Date"; break;
                    case 'passport':
                    case 'loa':
                    case 'company_check':
                    case 'approval': lastDateTitle = "Date of Issue"; break;
                    case 'ppc': lastDateTitle = "Last PPC Date"; break;
                    case 'line_check': lastDateTitle = "Last Annual Check"; break;
                }

                const isNoExpiryCat = categoryId === 'avsec' || categoryId === 'sms';
                const expiryDateTitle = isNoExpiryCat ? "Date of Conduct" : "Date of Expiry";

                let headRow = ['No', 'Rank, Name & License No.'];
                if (categoryId === 'english') headRow.push('English Level');
                if (!isNoExpiryCat) headRow.push(lastDateTitle);
                headRow.push(expiryDateTitle);
                headRow.push('Status');

                const head = [headRow];
                const body = mockData.map((crew, idx) => {
                    const license = crew.licenseNo ? crew.licenseNo : '-';
                    const formattedName = `${crew.rank} ${crew.name} ${license}`;
                    const training = crew.training[categoryId];

                    let row = [idx + 1, formattedName];
                    if (categoryId === 'english') row.push(training.englishLevel || '-');
                    if (!isNoExpiryCat) row.push(formatDate(training.issueDate));
                    row.push(formatDate(isNoExpiryCat ? training.issueDate : training.expiryDate));
                    row.push(isNoExpiryCat ? 'Current' : (training.status || '-'));
                    return row;
                });

                doc.autoTable({
                    startY: 145, 
                    head: head,
                    body: body,
                    theme: 'striped',
                    headStyles: { fillColor: [15, 23, 42], textColor: 255, fontSize: 9, halign: 'center' },
                    bodyStyles: { fontSize: 8, textColor: [51, 65, 85], halign: 'center' },
                    columnStyles: { 1: { halign: 'left' } },
                    margin: { left: 40, right: 40 },
                    didParseCell: function(data) {
                        if (data.section === 'body' && data.column.index === headRow.length - 1) {
                            if (data.cell.raw === 'Valid' || data.cell.raw === 'Current') data.cell.styles.textColor = [21, 128, 61]; 
                            else if (data.cell.raw === 'Expiring Soon') data.cell.styles.textColor = [161, 98, 7];
                            else if (data.cell.raw === 'Expired') data.cell.styles.textColor = [185, 28, 28];
                            data.cell.styles.fontStyle = 'bold';
                        }
                    }
                });

                doc.save(`Ecrew_${category.name.replace(/\s+/g, '_')}_${today.replace(/\//g, '-')}.pdf`);
            };

            const logoUrl = "https://lh3.googleusercontent.com/d/1WNcGjsZ9_Fp54xzOl01EYRqM6-wY5Zh7";
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = function() { generatePDF(this); };
            img.onerror = function() { generatePDF(null); };
            img.src = logoUrl;
        }

        // --- SIDEBAR LOGIC ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            isSidebarOpen = !isSidebarOpen;
            
            if (isSidebarOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        // --- NAVIGATION LOGIC ---

        function navigate(viewId) {
            currentView = viewId;
            isTableEditMode = false;

            // Tutup sidebar jika layar berukuran mobile saat navigasi diklik
            if (window.innerWidth < 768 && isSidebarOpen) {
                toggleSidebar();
            }

            const dashboardNav = document.getElementById('nav-dashboard');
            const adminNav = document.getElementById('nav-admin');

            if (dashboardNav && adminNav) {
                dashboardNav.classList.remove('bg-blue-600', 'text-white', 'shadow-md');
                dashboardNav.classList.add('text-slate-300', 'hover:bg-slate-800');
                adminNav.classList.remove('bg-slate-800', 'text-white');

                if (viewId === 'dashboard') {
                    dashboardNav.classList.add('bg-blue-600', 'text-white', 'shadow-md');
                    dashboardNav.classList.remove('text-slate-300', 'hover:bg-slate-800');
                } else if (viewId === 'admin-login' || viewId === 'admin-dashboard') {
                    adminNav.classList.add('bg-slate-800', 'text-white');
                }
            }

            if (viewId === 'dashboard') {
                document.getElementById('page-title').innerText = "Dashboard";
                renderDashboard();
            } else if (viewId === 'admin-login') {
                document.getElementById('page-title').innerText = "Admin Authentication";
                renderAdminLogin();
            } else if (viewId === 'admin-dashboard') {
                document.getElementById('page-title').innerText = "Admin Workspace";
                renderAdminDashboard();
            } else {
                const category = categories.find(c => c.id === viewId);
                document.getElementById('page-title').innerText = "Training Record Detail";
                renderTable(category);
            }
        }

        function initApp() {
            // Cek apakah ada data cache tersimpan
            const cachedData = localStorage.getItem('ecrew_cached_data');
            
            if (cachedData) {
                try {
                    mockData = JSON.parse(cachedData);
                    // Render instan dengan data cache
                    navigate('dashboard');
                    // Fetch data terbaru secara diam-diam di latar belakang
                    syncData(true);
                } catch (e) {
                    syncData(false);
                }
            } else {
                // Fetch data normal jika pertama kali buka (belum ada cache)
                syncData(false);
            }
        }

        initApp();

    </script>
</body>
</html>
